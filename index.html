<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="/comade.png">
<title>CoMade — Capability Video</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  video{width:100%;height:100%;object-fit:contain;background:#000}
  #logo{position:fixed;top:18px;left:18px;width:130px;opacity:.9;pointer-events:none;z-index:2}
  #msg{color:#fff;font-family:system-ui,sans-serif}
  #play{position:fixed;inset:0;width:100%;height:100%;border:0;background:transparent;
        cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:3}
  #play .circle{width:104px;height:104px;border-radius:50%;background:rgba(0,0,0,.55);
        display:flex;align-items:center;justify-content:center;transition:background .15s,transform .15s}
  #play:hover .circle{background:rgba(0,0,0,.78);transform:scale(1.05)}
  #play svg{width:44px;height:44px;margin-left:6px;fill:#fff}
</style>
</head>
<body>
<div id="wrap">
  <video id="v" controls playsinline preload="auto"></video>
  <button id="play" aria-label="Play video">
    <span class="circle"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></span>
  </button>
</div>
<img id="logo" src="/comade.png" alt="CoMade">
<script src="/hls.min.js"></script>
<script>
  var v = document.getElementById('v');
  var playBtn = document.getElementById('play');
  var src = '/hls/master.m3u8';
  if (v.canPlayType('application/vnd.apple.mpegurl')) {
    v.src = src;                              // Safari / iOS native HLS
  } else if (window.Hls && Hls.isSupported()) {
    var hls = new Hls({ startLevel: -1 });    // -1 = auto-select by bandwidth
    hls.loadSource(src);
    hls.attachMedia(v);
  } else {
    document.getElementById('wrap').innerHTML =
      '<p id="msg">Your browser cannot play this video.</p>';
  }
  // Click anywhere on the video to start playback with sound (unmuted).
  playBtn.addEventListener('click', function () { v.play(); });
  v.addEventListener('play', function () { playBtn.style.display = 'none'; });
</script>
</body>
</html>
